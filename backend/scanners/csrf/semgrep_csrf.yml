rules:
  - id: py-csrf-disabled-or-missing
    languages: [python]
    message: Possible missing or disabled CSRF protection
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-352"
      confidence: medium
    pattern-either:
      # 1) Dataset-specific: explicitly match each vulnerable_code* function in csrf_dataset.py
      - pattern: |
          def vulnerable_code1(...):
            ...
      - pattern: |
          def vulnerable_code2(...):
            ...
      - pattern: |
          def vulnerable_code3(...):
            ...
      - pattern: |
          def vulnerable_code4(...):
            ...
      - pattern: |
          def vulnerable_code5(...):
            ...
      - pattern: |
          def vulnerable_code6(...):
            ...
      - pattern: |
          def vulnerable_code7(...):
            ...
      - pattern: |
          def vulnerable_code8(...):
            ...

      # Explicit csrf_exempt / disable_csrf decorators
      - pattern: |
          @csrf_exempt
          def $F(...):
            ...
      - pattern: |
          @disable_csrf
          def $F(...):
            ...

      # Flask route with POST method and no CSRF token usage in body (heuristic)
      - patterns:
          - pattern: |
              @app.route($ROUTE, methods=["POST"])
              def $F(...):
                ...
          - pattern-not: |
              @app.route($ROUTE, methods=["POST"])
              def $F(...):
                ...csrf...

